name: serene_log
description: "SereneLog - Personal Diary, Planner & Life Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # UI & Theme
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Storage & Files
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  image_picker: ^1.1.2

  # Network & API
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Audio
  just_audio: ^0.9.41

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # Calendar
  table_calendar: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Image cache
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/music/
    - assets/lottie/
    - assets/translations/

  